# GNU nano 6.2                   docker-compose.yml
services:
  db:
    image: postgres:15-alpine
    container_name: foodgram-db
    restart: always
    env_file:
      - .env.backend
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          set -e
          USER="$${POSTGRES_USER:-postgres}"
          DB="$${POSTGRES_DB:-}"
          if [ -z "$$DB" ]; then
            DB="$$USER"
          fi
          HOST="$${POSTGRES_HOST:-127.0.0.1}"
          PORT="$${POSTGRES_PORT:-5432}"
          if [ -n "$${POSTGRES_PASSWORD:-}" ]; then
            PGPASSWORD="$${POSTGRES_PASSWORD}" pg_isready -h "$$HOST" -p "$$PORT" -U "$$USER" -d "$$DB"
          else
            pg_isready -h "$$HOST" -p "$$PORT" -U "$$USER" -d "$$DB"
          fi
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKERHUB_USERNAME:-foodgram}/foodgram_backend:${FOODGRAM_BACKEND_TAG:-latest}
    container_name: foodgram-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_ENGINE: django.db.backends.postgresql
    volumes:
      - media_value:/app/media
      - static_value:/app/collected_static

  nginx:
    image: nginx:1.25.4-alpine
    container_name: foodgram-nginx
    depends_on:
      - backend
    restart: always
    ports:
      - "10000:80"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_value:/var/html/static:ro
      - media_value:/var/html/media:ro
      - ./docs:/var/html/docs:ro

volumes:
  pg_data:
  media_value:
  static_value:
