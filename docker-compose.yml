services:
  db:
    image: postgres:15-alpine
    container_name: foodgram-db
    restart: always
    env_file:
      - .env.backend
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - |
          set -e
          HOST="$${POSTGRES_HOST:-127.0.0.1}"
          PORT="$${POSTGRES_PORT:-5432}"
          DB="$${POSTGRES_DB:-}"
          if [ -z "$$DB" ]; then
            DB="$${POSTGRES_USER:-postgres}"
          fi

          check_ready() {
            local user="$1"
            if [ -z "$$user" ]; then
              return 1
            fi

            if [ -n "$${POSTGRES_PASSWORD:-}" ]; then
              PGPASSWORD="$${POSTGRES_PASSWORD}" pg_isready -h "$$HOST" -p "$$PORT" -U "$$user" -d "$$DB"
            else
              pg_isready -h "$$HOST" -p "$$PORT" -U "$$user" -d "$$DB"
            fi
          }

          if check_ready "$${POSTGRES_USER:-}"; then
            exit 0
          fi

          check_ready postgres
      start_period: 20s
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    image: ${DOCKERHUB_USERNAME:-foodgram}/foodgram_backend:${FOODGRAM_BACKEND_TAG:-latest}
    container_name: foodgram-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_ENGINE: django.db.backends.postgresql
    volumes:
      - media_value:/app/media
      - static_value:/app/collected_static

  nginx:
    image: nginx:1.25.4-alpine
    container_name: foodgram-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - static_value:/usr/share/nginx/html/static/
      - media_value:/usr/share/nginx/html/media/

volumes:
  pg_data:
  media_value:
  static_value: