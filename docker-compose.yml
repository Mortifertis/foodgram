services:
  db:
    image: postgres:15-alpine
    container_name: foodgram-db
    restart: always
    env_file:
      - .env.backend
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test:
        - "CMD-SHELL"
        - >-
          if [ -n "$${POSTGRES_PASSWORD:-}" ]; then
            PGPASSWORD="$${POSTGRES_PASSWORD}" pg_isready -h "$${POSTGRES_HOST:-127.0.0.1}" -p "$${POSTGRES_PORT:-5432}" -U "$${POSTGRES_USER:-postgres}" -d "$${POSTGRES_DB:-$${POSTGRES_USER:-postgres}}"
          else
            pg_isready -h "$${POSTGRES_HOST:-127.0.0.1}" -p "$${POSTGRES_PORT:-5432}" -U "$${POSTGRES_USER:-postgres}" -d "$${POSTGRES_DB:-$${POSTGRES_USER:-postgres}}"
          fi

      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 12

  backend:
    image: ${DOCKERHUB_USERNAME:-foodgram}/foodgram_backend:${FOODGRAM_BACKEND_TAG:-latest}
    container_name: foodgram-backend
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env.backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_ENGINE: django.db.backends.postgresql
    volumes:
      - media_value:/app/media
      - static_value:/app/collected_static

  nginx:
    image: nginx:1.25.4-alpine
    container_name: foodgram-nginx
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    volumes:
      - static_value:/usr/share/nginx/html/static/
      - media_value:/usr/share/nginx/html/media/

volumes:
  pg_data:
  media_value:
  static_value: