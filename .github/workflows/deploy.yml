name: Foodgram CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-foodgram
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/foodgram_backend
  REMOTE_APP_PATH: ${{ secrets.REMOTE_APP_PATH }}

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout (for files to copy)
        uses: actions/checkout@v4

      - name: Prepare remote dir & fix permissions
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            sudo mkdir -p "${{ env.REMOTE_APP_PATH }}/infra" "${{ env.REMOTE_APP_PATH }}/frontend" "${{ env.REMOTE_APP_PATH }}/docs"
            sudo chown -R "${USER}":"${USER}" "${{ env.REMOTE_APP_PATH }}"
            # удалим старый compose, чтобы не мешал перезаписи
            rm -f "${{ env.REMOTE_APP_PATH }}/docker-compose.backend.yml"

      - name: Upload backend compose
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: docker-compose.backend.yml
          target: ${{ env.REMOTE_APP_PATH }}
          overwrite: true

      - name: Upload infra + frontend + docs (incl. override)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          source: |
            infra/**
            frontend/**
            docs/**
          target: ${{ env.REMOTE_APP_PATH }}
          overwrite: true

      - name: Deploy both stacks over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd "${{ env.REMOTE_APP_PATH }}"

            if [ ! -f ".env.backend" ]; then
              echo "::error ::Файл ${{ env.REMOTE_APP_PATH }}/.env.backend не найден на сервере. Создай его вручную и перезапусти деплой."
              exit 1
            fi

            # для подстановки image: ${DOCKERHUB_USERNAME}/foodgram_backend в compose
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

            echo "Docker login..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "Pull latest backend image..."
            docker pull "${{ env.IMAGE_NAME }}:latest" || true

            echo "Start/Update backend+db stack..."
            docker compose -f docker-compose.backend.yml pull backend || true
            docker compose -f docker-compose.backend.yml up -d

            echo "Apply migrations & collectstatic (runtime, Postgres)..."
            docker compose -f docker-compose.backend.yml run --rm backend python manage.py migrate --noinput
            docker compose -f docker-compose.backend.yml run --rm backend python manage.py collectstatic --noinput

            echo "Start/Update infra (frontend build + nginx) with override..."
            cd infra
            docker compose -f docker-compose.yml -f docker-compose.override.yml up -d --build

            echo "Done."

  notify:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Notify in Telegram
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ Foodgram: деплой успешно завершён.
            Репозиторий: ${{ github.repository }}
            Коммит: ${{ github.sha }}
