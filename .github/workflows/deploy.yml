name: Foodgram CI/CD

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: deploy-foodgram
  cancel-in-progress: true

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/foodgram_backend
  REMOTE_APP_PATH: ${{ secrets.REMOTE_APP_PATH }}   # напр.: /home/yc-user/foodgram

jobs:
  build_and_push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Docker Hub login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    runs-on: ubuntu-latest
    needs: build_and_push
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout (to scp needed dirs)
        uses: actions/checkout@v4

      - name: Upload backend compose & env
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: |
            docker-compose.backend.yml
          target: ${{ env.REMOTE_APP_PATH }}

      - name: Upload infra + frontend + docs (+ override)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          source: |
            infra/**
            infra/docker-compose.override.yml
            frontend/**
            docs/**
          target: ${{ env.REMOTE_APP_PATH }}

      - name: Deploy both stacks over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            cd "${REMOTE_APP_PATH}"

            if [ ! -f ".env.backend" ]; then
              echo "::error ::Файл ${REMOTE_APP_PATH}/.env.backend не найден на сервере. Создай его вручную (секреты) и перезапусти деплой."
              exit 1
            fi

            # Переменная нужна для подстановки image: ${DOCKERHUB_USERNAME}/foodgram_backend в compose
            export DOCKERHUB_USERNAME="${{ secrets.DOCKERHUB_USERNAME }}"

            echo "Docker login..."
            echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

            echo "Pull latest backend image..."
            docker pull "${IMAGE_NAME}:latest" || true

            echo "Start/Update backend+db stack..."
            docker compose -f docker-compose.backend.yml pull backend || true
            docker compose -f docker-compose.backend.yml up -d

            echo "Apply migrations & collectstatic (runtime, Postgres)..."
            docker compose -f docker-compose.backend.yml run --rm backend python manage.py migrate --noinput
            docker compose -f docker-compose.backend.yml run --rm backend python manage.py collectstatic --noinput

            echo "Start/Update infra (frontend build + nginx) with override..."
            cd infra
            docker compose -f docker-compose.yml -f docker-compose.override.yml up -d --build

            echo "Cleanup..."
            docker system prune -f
